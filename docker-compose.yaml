services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    environment:
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
    # command: >
    #   sh -c "gunicorn -k uvicorn.workers.UvicornWorker main:app --host
    networks:
    - github-app-network

  smee:
    build:
      context: .
      dockerfile: Dockerfile.smee
    environment:
      - SMEE_URL=${SMEE_URL}
      - SMEE_TARGET=${SMEE_TARGET}
    networks:
    - github-app-network

networks:
  github-app-network:
    driver: bridge
